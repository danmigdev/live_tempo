AutoName: LiveTempo
Summary: Manage song playlists with BPM for live performances
Description: |
  LiveTempo helps musicians manage song playlists with reference
  BPMs for live performances. Before each song starts, check the
  BPM to set the correct tempo right from your phone.

  Features:
  * Sign in with Google
  * Create and manage song playlists
  * Set a reference BPM for each song
  * Tap Tempo: tap to calculate BPM from any rhythm
  * Visual metronome pulse at the song's exact tempo
  * Import playlists directly from YouTube
  * Color-coded BPM badges (slow/medium/fast)
  * Dark theme for stage environments
  * Multi-language: Italian and English

