Categories:
  - Multimedia
License: MIT
AuthorName: danmigdev
WebSite: https://github.com/danmigdev/live_tempo
SourceCode: https://github.com/danmigdev/live_tempo
IssueTracker: https://github.com/danmigdev/live_tempo/issues

AutoName: LiveTempo
Summary: Manage song playlists with BPM for live performances
Description: |
  LiveTempo helps you manage song playlists with reference BPMs
  for live performances. Before each song, check the BPM to set
  the correct tempo.

  Features:
  - Sign in with Google
  - Create song playlists
  - Set a BPM for each song
  - Tap Tempo to calculate BPM by tapping the rhythm
  - Color-coded BPM: slow (blue), medium (green), fast (orange)
  - Dark theme optimized for live environments

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 1.0.0
CurrentVersionCode: 1

RepoType: git
Repo: https://github.com/danmigdev/live_tempo.git

Builds:
  - versionName: '1.0.0'
    versionCode: 1
    commit: v1.0.0
    subdir: .
    gradle:
      - yes
    srclibs:
      - Capacitor@v7.2.1
    prebuild:
      - npm ci
      - npx cap sync android
    scanignore:
      - android/app/src/main/assets/public
