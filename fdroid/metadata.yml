AutoName: LiveTempo
Summary: Gestisci playlist e BPM per performance live
Description: |
  LiveTempo ti aiuta a gestire le tue playlist di canzoni con i BPM
  di riferimento per le performance dal vivo. Prima di ogni canzone,
  controlla il BPM per impostare il tempo corretto.

  Funzionalita':
  - Accedi con Google
  - Crea playlist di canzoni
  - Associa un BPM a ogni canzone
  - Tap Tempo per calcolare il BPM battendo il ritmo
  - BPM color-coded: lenti (blu), medi (verde), veloci (arancione)
  - Dark theme ottimizzato per ambienti live

AutoUpdateMode: Version
