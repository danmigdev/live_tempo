name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Capacitor web assets
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        continue-on-error: true

      - name: Copy APK for release
        run: |
          mkdir -p release
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned-signed.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned-signed.apk release/livetempo.apk
          elif [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk release/livetempo.apk
          elif [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk release/livetempo.apk
          else
            echo "No APK found, listing outputs:"
            find android/app/build/outputs -name "*.apk" -type f
            # Build debug APK as fallback
            cd android && chmod +x gradlew && ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk ../release/livetempo.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LiveTempo ${{ github.ref_name }}
          files: release/livetempo.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
